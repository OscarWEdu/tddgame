name: CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs: 
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Create solution file
        run: |
          dotnet new sln -n tddgame -o . --force
          ls *.sln
          dotnet sln tddgame.sln add backend/Backend.csproj
          dotnet sln tddgame.sln add Backend.Tests/Backend.Tests.csproj
      - name: Restore dependencies
        run: dotnet restore tddgame.sln

      - name: Build
        run: dotnet build tddgame.sln --no-restore

      - name: Run unit tests
        run: dotnet test tddgame.sln --no-build --verbosity normal


